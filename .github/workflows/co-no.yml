# ==================== 工作流名称 ====================
# 这个名称会显示在 GitHub Actions 页面中
name: 每6小时动态搜集 + subs-check测活测速 + sing-box精准延迟 + 输出标准节点

# ==================== 触发条件 ====================
on:
  # 北京时间 00:00、06:00、12:00、18:00 执行（每6小时一次，从0点开始）
  schedule:
    - cron: '0 4,10,16,22 * * *'   # UTC 04:00,10:00,16:00,22:00 → 北京时间 12:00,18:00,00:00,06:00

  # 允许手动触发：可以在 GitHub Actions 页面点击 "Run workflow" 立即运行
  workflow_dispatch:

# ==================== 任务定义 ====================
jobs:
  # 任务名称（可以自定义）
  collect:
    # 运行环境：使用最新的 Ubuntu 系统
    runs-on: ubuntu-latest

    # ==================== 环境变量 ====================
    # FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true
    # 强制 GitHub Actions 使用 Node.js 24，解决 Node.js 20 已弃用警告
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_NO_WARNINGS: "1"           # 隐藏弃用警告，让日志更干净

    # 关键：声明需要写权限（必须开启，否则 git push 会 403）
    permissions:
      contents: write     # 允许推送代码
      actions: read

    # ==================== 执行步骤（按顺序执行） ====================
    steps:
      # 步骤1：拉取仓库代码
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        # 使用官方 checkout action 的最新 v4 版本

      # 步骤2：设置 Python 环境
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'     # 指定使用 Python 3.12

      # 步骤3：安装 Python 依赖
      - name: 安装依赖（requests 库）
        run: pip install requests
        # 安装 co_no.py 脚本需要的 requests 库

      # 步骤4：执行我们的搜集脚本
      - name: 运行动态搜索脚本（生成 no.txt + da_fr_no.txt）
        env:
          # 将 GitHub 自动提供的仓库令牌传递给脚本
          # 让脚本可以使用已认证的 GitHub API（更高的速率限制）
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python co_no.py
        # 执行我们编写的 co_no.py 脚本

      # ==================== 第一阶段：subs-check 批量测活 + 测速 ====================
      - name: 下载并运行 subs-check（20万节点本地高效测试）
        run: |
          echo "🚀 开始下载最新 subs-check..."
          curl -L -o subs-check https://github.com/beck-8/subs-check/releases/latest/download/subs-check_linux_amd64
          chmod +x subs-check

          echo "📊 开始对 no.txt (20万+节点) 进行测活 + 测速..."
          ./subs-check \
            -input no.txt \
            -output alive.txt \
            -concurrency 50 \          # 并发数：50是最稳的选择（20万节点约1-2小时）
            -timeout 12 \              # 单节点超时时间（秒）——推荐12-15
            -speed true \              # 开启真实测速
            -speed-timeout 8 \         # 测速超时时间（秒）
            -target none \             # 不输出 sing-box 配置，保持【标准协议链接】
            -log-level info            # 详细日志

          echo "✅ subs-check 完成！存活 + 测速后的标准节点已保存到 alive.txt"

      # ==================== 第二阶段：sing-box 精准延迟测试 ====================
      - name: 下载 sing-box 并生成最终标准节点（带延迟排序）
        run: |
          echo "🚀 下载最新 sing-box..."
          curl -L -o sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/latest/download/sing-box-*-linux-amd64.tar.gz
          tar -xzf sing-box.tar.gz
          mv sing-box-*/sing-box ./sing-box
          chmod +x sing-box

          echo "📈 sing-box 开始对 alive.txt 进行 URLTest 精准延迟测试..."
          python process_final_nodes.py alive.txt final_nodes.txt

          echo "✅ 最终标准协议节点已生成 → final_nodes.txt（按延迟排序）"

      # ==================== 提交所有结果 ====================
      - name: 提交更新后的所有文件
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 添加文件（同时提交 da_fr_no.txt 和 no.txt 和 alive.txt 和 final_nodes.txt）
          git add da_fr_no.txt
          git add no.txt
          git add alive.txt
          git add final_nodes.txt

          # 提交（如果文件没有变化则不提交）
          # 使用北京时间（UTC+8）作为提交时间
          git commit -m "自动更新 + subs-check测活测速 + sing-box精准延迟 - $(date -u -d '+8 hours' +'%Y-%m-%d %H:%M:%S CST')" || echo "No changes to commit"

          # 推送到仓库
          git push
