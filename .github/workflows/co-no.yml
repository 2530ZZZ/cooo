name: 每小时动态搜集免费节点

on:
  schedule:
    - cron: '0 * * * *'      # 每小时整点运行（北京时间每小时00分）
  workflow_dispatch:         # 允许手动运行

jobs:
  collect:
    runs-on: ubuntu-latest

    # 强制使用 Node.js 24（解决警告的核心）
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖（requests库）
        run: pip install requests

      - name: 运行动态搜索脚本
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python co_no.py

      - name: 提交更新后的 da_fr_no.txt
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add da_fr_no.txt
          git commit -m "自动更新节点列表 - $(date +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes"
          git push
